name: RC Validation

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify lockfile
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json ausente — instalação não reproduzível"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Audit (critical)
        run: npm audit --audit-level=critical

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Health check
        run: |
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/api/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done
          cat /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
          kill "$SERVER_PID"
